# ============================================================================
# CONFIGURACIÓN DEL PROYECTO
# ============================================================================
# Archivo unificado de configuración para Black, Ruff, y otras herramientas
#
# CONVENCIONES DE CÓDIGO DEL PROYECTO (no verificables automáticamente):
# 1. FUNCIONES INTERNAS (nested functions):
#    - Deben definirse SIEMPRE al inicio del método/función padre
#    - Nunca definir funciones a mitad del código
#    - Ejemplo correcto:
#      def metodo_principal(self):
#          def helper_uno():     # <- Al inicio
#              pass
#          def helper_dos():     # <- Al inicio
#              pass
#
#          # Código principal aquí
#          resultado = helper_uno()
#          ...
#
# 2. ORDEN DENTRO DE CLASES:
#    - __init__ primero
#    - Métodos públicos
#    - Métodos privados (_metodo)
#    - Métodos estáticos/de clase al final
# ============================================================================

# ============================================================================
# BLACK - Formateador de código
# ============================================================================
[tool.black]
line-length = 120
target-version = ['py310']
include = '\.pyi?$'
extend-exclude = '''
/(
    __pycache__
    | \.git
    | venv
    | env
    | \.venv
    | build
    | dist
)/
'''

# ============================================================================
# RUFF - Linter rápido
# https://docs.astral.sh/ruff/
# ============================================================================
[tool.ruff]
line-length = 120
target-version = "py310"
indent-width = 4

extend-exclude = [
    "__pycache__",
    ".git",
    "venv",
    "env",
    ".venv",
    "*.egg-info",
    "build",
    "dist",
]

# Configuración de formato (compatible con Black)
[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false
docstring-code-format = false

# Reglas de linting
[tool.ruff.lint]
select = [
    # === IMPORTS (OBLIGATORIO) ===
    "I",      # isort - ordenamiento de imports
    "F401",   # unused imports - imports no usados

    # === ERRORES COMUNES ===
    "E",      # pycodestyle errors
    "F",      # pyflakes - errores básicos
    "W",      # pycodestyle warnings

    # === VARIABLES NO USADAS ===
    "F841",   # variable local no usada

    # === BUENAS PRÁCTICAS ===
    "B",      # bugbear - detecta bugs comunes
    "UP",     # pyupgrade - modernizar sintaxis Python
    "SIM",    # simplificaciones de código
    "RUF",    # reglas específicas de ruff
]

ignore = [
    "E501",   # line too long (manejado por line-length)
]

# Reglas específicas de imports
[tool.ruff.lint.isort]
force-single-line = false
lines-after-imports = 2
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder"
]
known-first-party = [
    "Class_customer",
    "Class_DataFrame",
    "Class_gestion",
    "Modulos_Mysql",
    "AppValuations"
]

# Excepciones por archivo
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"DashMainV9_ia.py" = ["T20"]
